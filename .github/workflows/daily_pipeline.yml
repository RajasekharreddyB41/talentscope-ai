name: TalentScope AI — Daily Data Pipeline

on:
  schedule:
    # Runs every day at 6:00 AM UTC (1:00 AM EST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  daily-ingest:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          pip install pandas sqlalchemy psycopg2-binary python-dotenv requests scikit-learn sentence-transformers
      
      - name: Run daily ingestion (JSearch + Adzuna)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          python -m src.ingestion.batch_ingest
      
      - name: Run cleaning pipeline (raw → clean)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m src.pipeline.dedup
      
      - name: Run feature engineering
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m src.models.feature_engineering
      
      - name: Verify pipeline results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          from src.database.connection import get_engine
          from sqlalchemy import text
          e = get_engine()
          with e.connect() as c:
              raw = c.execute(text('SELECT COUNT(*) FROM raw_jobs')).fetchone()[0]
              clean = c.execute(text('SELECT COUNT(*) FROM clean_jobs')).fetchone()[0]
              feat = c.execute(text('SELECT COUNT(*) FROM job_features')).fetchone()[0]
              sal = c.execute(text('SELECT COUNT(*) FROM clean_jobs WHERE salary_min IS NOT NULL')).fetchone()[0]
              print(f'raw_jobs: {raw}')
              print(f'clean_jobs: {clean}')
              print(f'job_features: {feat}')
              print(f'with_salary: {sal}')
              assert clean > 0, 'No clean jobs found!'
              assert feat > 0, 'No features found!'
              print('Pipeline verification PASSED')
          "