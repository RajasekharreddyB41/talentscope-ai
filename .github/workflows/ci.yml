name: TalentScope AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install flake8 pandas sqlalchemy psycopg2-binary python-dotenv scikit-learn requests

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 --ignore=E501,W503,E402 --count --show-source --statistics

      - name: Validate DAG structure
        run: |
          python -c "
          import os
          dag_path = 'airflow/dags/jobpulse_dag.py'
          with open(dag_path) as f:
              code = f.read()
          checks = ['task_ingest_api', 'task_clean', 'task_build_features', 'task_report', 'ingest >> clean >> features >> report']
          for c in checks:
              assert c in code, f'Missing: {c}'
          print('DAG validation passed')
          "

      - name: Validate project structure
        run: |
          python -c "
          import os
          required = [
              'src/ingestion/api_connector.py',
              'src/pipeline/etl.py',
              'src/pipeline/normalize.py',
              'src/pipeline/dedup.py',
              'src/pipeline/validate.py',
              'src/models/salary_predictor.py',
              'src/models/skill_gap_analyzer.py',
              'src/models/job_clustering.py',
              'src/database/schema.sql',
              'src/app/Home.py',
          ]
          for f in required:
              assert os.path.exists(f), f'Missing: {f}'
          print(f'All {len(required)} required files present')
          "